# AgentFlow AI - Alembic Configuration

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path prepend - allows auto-generating migrations
prepend_sys_path = .

# Timezone to use when rendering the date within the migration file
# as well as the filename.
# string value is passed to dateutil.tz.gettz()
# leave blank for localtime
# timezone =

# Max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command
# regardless of autogenerate
# revision_environment = false

# Set to 'true' to allow .hierarchical revisions to be applied
# in a non-linear fashion (as long as they end up at the same end point)
# set to 'false' for strict linear migration (default)
# non_hierarchical = false

# SQLAlchemy URL - overridden by env.py from environment variable
sqlalchemy.url = postgresql+asyncpg://agentflow:agentflow@localhost:5432/agentflow

[post_write_hooks]
# Hooks for formatting migrations after generation
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = --config pyproject.toml

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
